name: Build & Release JewelloSoft

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    permissions:
      contents: write  # Required for creating GitHub releases
    
    steps:
      # ── Checkout ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python (for Django backend binary) ─────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements/base.txt
          pip install pyinstaller waitress

      - name: Build backend executable
        working-directory: backend
        run: |
          python build_backend.py

      # ── Setup Node.js (for React + Electron) ─────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build React Frontend ─────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── Build Electron Installer ─────────────────────────────────
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build & Publish Electron installer
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:publish
      
      # ── Upload artifacts (backup) ────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: JewelloSoft-Windows-Installer
          path: desktop/dist/*.exe
          retention-days: 30

      - name: Upload backend executable
        uses: actions/upload-artifact@v4
        with:
          name: JewelloSoft-Backend-Executable
          path: backend/dist/backend.exe
          retention-days: 30
