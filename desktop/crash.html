<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JewelloSoft Error Recovery</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #eaedf2; color: #1e293b; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; }
    .icon { font-size: 48px; color: #ef4444; margin-bottom: 20px; }
    h2 { margin: 0 0 10px; font-size: 24px; color: #0f172a; }
    p { margin: 0 0 25px; font-size: 15px; color: #64748b; line-height: 1.5; }
    .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h2>Backend Initialization Failed</h2>
    <p>JewelloSoft's core database/server could not be started or crashed unexpectedly. Please check the logs in AppData.</p>
    <button class="btn" onclick="window.close()">Exit Application</button>
  </div>
</body>
</html>
